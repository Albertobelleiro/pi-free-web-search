name: Bug report
description: Report a reproducible problem in pi-free-web-search
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce reliably.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact steps to reproduce
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 14 / Ubuntu 24.04 / ...
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime versions
      description: Bun / Pi version if known
      placeholder: Bun 1.3.x, Pi 0.62.x
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I have checked existing issues and did not find a duplicate.
          required: true
        - label: I am not reporting a security vulnerability publicly.
          required: true
